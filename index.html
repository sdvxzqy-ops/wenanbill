@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
:root{
  --bg:#0a0a14;--glass:rgba(255,255,255,.028);--glass2:rgba(255,255,255,.05);
  --line:rgba(255,255,255,.06);--line2:rgba(255,255,255,.1);
  --t1:#eeeef4;--t2:rgba(255,255,255,.5);--t3:rgba(255,255,255,.22);
  --acc:#49c5b6;--acc2:#2779a7;--acc-g:linear-gradient(135deg,#49c5b6,#2779a7);
  --warm:#ec8f6a;--warm-g:linear-gradient(135deg,#ec8f6a,#d35f8d);
  --soft:#a78bfa;--green:#34d399;--red:#f87171;
  --font:'DM Sans','Noto Sans SC',-apple-system,sans-serif;
  --r:20px;--r2:14px;--r3:10px;
  --ease:cubic-bezier(.22,1,.36,1);--ease2:cubic-bezier(.16,1,.3,1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(73,197,182,.2);border-radius:3px}
input,textarea,select{-webkit-user-select:text;user-select:text}

.ambient{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.6}
.amb{position:absolute;border-radius:50%;filter:blur(120px);will-change:transform;transition:transform 8s var(--ease)}
.a1{width:500px;height:500px;background:rgba(73,197,182,.08);top:-20%;left:-10%}
.a2{width:400px;height:400px;background:rgba(236,143,106,.06);bottom:-15%;right:-10%}
.a3{width:300px;height:300px;background:rgba(167,139,250,.05);top:50%;left:50%;transform:translate(-50%,-50%)}

.pulse{position:absolute;border-radius:50%;pointer-events:none;z-index:99;background:radial-gradient(circle,rgba(73,197,182,.3),rgba(73,197,182,.1) 40%,transparent 70%);transform:scale(0);opacity:1}
.pulse.go{animation:clickPulse .5s var(--ease2) forwards}
@keyframes clickPulse{0%{transform:scale(0);opacity:.8}100%{transform:scale(1);opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleUp{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes checkDraw{from{stroke-dashoffset:24}to{stroke-dashoffset:0}}

.app{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:0 20px 80px}

.hdr{padding:32px 0 12px;display:flex;align-items:center;justify-content:space-between;animation:fadeIn .8s var(--ease)}
.hdr-l{display:flex;align-items:center;gap:16px}
.hdr-ico{width:48px;height:48px;border-radius:15px;display:flex;align-items:center;justify-content:center;background:var(--acc-g);font-size:22px;box-shadow:0 8px 24px rgba(73,197,182,.2),0 2px 6px rgba(0,0,0,.3);overflow:hidden}
.hdr-t{font-size:22px;font-weight:700;letter-spacing:-.5px}
.hdr-s{font-size:11px;color:var(--t2);margin-top:3px;letter-spacing:2px;text-transform:uppercase;font-weight:400}
.hdr-r{display:flex;align-items:center;gap:10px}
.save-pill{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.1);font-size:10.5px;color:var(--green);font-weight:500}
.save-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.gear{width:38px;height:38px;border:none;border-radius:12px;background:var(--glass);border:1px solid var(--line);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t3);transition:all .5s var(--ease);position:relative;overflow:hidden}
.gear:hover{color:var(--t1);background:var(--glass2);border-color:var(--line2)}.gear:active{transform:scale(.9)}

.nav{padding:8px 0 24px;position:sticky;top:0;z-index:10}
.nav-bar{display:flex;padding:4px;border-radius:var(--r2);background:rgba(255,255,255,.02);border:1px solid var(--line);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px)}
.nav-b{flex:1;padding:11px 0;border:none;border-radius:var(--r3);background:transparent;color:var(--t3);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all .5s var(--ease);position:relative;overflow:hidden}
.nav-b.on{color:var(--t1);font-weight:600;background:rgba(73,197,182,.08)}
.nav-b.on::after{content:'';position:absolute;bottom:3px;left:50%;width:16px;height:2.5px;border-radius:2px;background:var(--acc);transform:translateX(-50%)}
.nav-b:not(.on):hover{color:var(--t2)}.nav-b:active{transform:scale(.95)}

.card{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--line);border-radius:var(--r);padding:24px;margin-bottom:16px;transition:border-color .6s var(--ease),box-shadow .6s var(--ease);position:relative;overflow:hidden}
.card:hover{border-color:rgba(73,197,182,.1);box-shadow:0 16px 48px rgba(0,0,0,.15)}
.ch{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.ci{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:16px}
.ci-a{background:rgba(73,197,182,.1)}.ci-w{background:rgba(236,143,106,.1)}.ci-s{background:rgba(167,139,250,.1)}.ci-g{background:rgba(52,211,153,.1)}
.ct{font-size:16px;font-weight:600;letter-spacing:-.3px}
.panel{display:none}.panel.on{display:block;animation:fadeUp .45s var(--ease)}

.inp{width:100%;padding:12px 16px;border:1px solid var(--line);border-radius:var(--r3);font-size:13px;font-family:var(--font);background:rgba(255,255,255,.02);color:var(--t1);transition:all .4s var(--ease)}
.inp::placeholder{color:var(--t3)}.inp:focus{border-color:var(--acc)!important;box-shadow:0 0 0 3px rgba(73,197,182,.08);background:rgba(255,255,255,.04)}
textarea.inp{resize:vertical;line-height:1.7}.inp-s{padding:8px 11px;font-size:12.5px;border-radius:8px}

<script>
document.addEventListener('click',e=>{
  const el=e.target.closest('.btn,.nav-b,.seg-b,.ec,.sc,.tp,.b-ico,.gear,.pc,.card');
  if(!el)return;const p=document.createElement('div');p.className='pulse';
  const r=el.getBoundingClientRect(),sz=Math.max(r.width,r.height)*2;
  p.style.width=p.style.height=sz+'px';p.style.left=(e.clientX-r.left-sz/2)+'px';p.style.top=(e.clientY-r.top-sz/2)+'px';
  if(getComputedStyle(el).position==='static')el.style.position='relative';el.style.overflow='hidden';
  el.appendChild(p);requestAnimationFrame(()=>p.classList.add('go'));setTimeout(()=>p.remove(),550);
});
document.addEventListener('mousemove',e=>{
  const x=(e.clientX/innerWidth-.5)*30,y=(e.clientY/innerHeight-.5)*30;
  document.querySelector('.a1').style.transform=`translate(${x}px,${y}px)`;
  document.querySelector('.a2').style.transform=`translate(${-x*.6}px,${-y*.6}px)`;
});

const K='cb_v7';
let D={tab:'projects',tm:'smart',tiers:[
  {id:'t1',maxChars:30,price:0.8,label:'≤30字'},{id:'t2',maxChars:50,price:1.2,label:'≤50字'},
  {id:'t3',maxChars:80,price:2,label:'≤80字'},{id:'t4',maxChars:120,price:4,label:'≤120字'},
  {id:'t5',maxChars:200,price:6,label:'≤200字'},{id:'t6',maxChars:500,price:15,label:'≤500字'},
  {id:'t7',maxChars:1000,price:25,label:'≤1000字'},
],tp:[],ta:false,projects:[],st:'',exSel:[]};
// exSel: array of project IDs selected for export. Empty = all selected.
function ld(){try{const s=localStorage.getItem(K);if(s){const d=JSON.parse(s);Object.assign(D,d);D.tp=[];D.ta=false}}catch(e){}}
function sv(){try{localStorage.setItem(K,JSON.stringify({tab:D.tab,tm:D.tm,tiers:D.tiers,projects:D.projects,st:D.st}))}catch(e){}}
let _s;function as(){clearTimeout(_s);_s=setTimeout(sv,200)}
function toast(m){const t=document.getElementById('toast');document.getElementById('tt').textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400)}
function openS(){document.getElementById('ov').classList.add('open')}
function closeS(){document.getElementById('ov').classList.remove('open')}
function expBak(){const b=new Blob([JSON.stringify({v:7,tiers:D.tiers,projects:D.projects},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`备份_${new Date().toISOString().slice(0,10)}.json`;a.click();toast('备份已导出')}
function impBak(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=x=>{try{const d=JSON.parse(x.target.result);if(d.tiers)D.tiers=d.tiers;if(d.projects)D.projects=d.projects;sv();render();toast('数据已恢复');closeS()}catch(e){alert('格式错误')}};r.readAsText(f);ev.target.value=''}
function clrAll(){if(!confirm('确定清空所有数据？'))return;localStorage.removeItem(K);location.reload()}

const uid=()=>Math.random().toString(36).slice(2,8);
const $=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const cc=t=>t.replace(/\s/g,'').length;
const ct=(ti,n)=>{const s=[...ti].sort((a,b)=>a.maxChars-b.maxChars);for(const t of s)if(n<=t.maxChars)return t.price;return s[s.length-1]?.price??0};
function pt(text){return text.split('\n').filter(l=>l.trim()).reduce((r,line)=>{const c=line.replace(/[，,；;]/g,' ').replace(/[：:]/g,' ').replace(/字/g,'').trim();let m;if(m=c.match(/(\d+)\s*[-~到至]\s*(\d+)\s+(\d+(?:\.\d+)?)/))return[...r,{id:uid(),maxChars:+m[2],price:+m[3],label:`${m[1]}-${m[2]}字`}];if(m=c.match(/[≤<]\s*(\d+)\s+(\d+(?:\.\d+)?)/))return[...r,{id:uid(),maxChars:+m[1],price:+m[2],label:`≤${m[1]}字`}];if(m=c.match(/(\d+)\s*(?:以内|以下|内)\s+(\d+(?:\.\d+)?)/))return[...r,{id:uid(),maxChars:+m[1],price:+m[2],label:`≤${m[1]}字`}];if(m=c.match(/^(\d+)\s+(\d+(?:\.\d+)?)$/))return[...r,{id:uid(),maxChars:+m[1],price:+m[2],label:`≤${m[1]}字`}];return r},[]);}
function grp(p){const g={};p.items.forEach(i=>{if(!g[i.price])g[i.price]={price:i.price,count:0,total:0};g[i.price].count++;g[i.price].total+=i.price});return Object.values(g).sort((a,b)=>a.price-b.price)}
function pT(p){return p.items.reduce((s,i)=>s+i.price,0)}

function sTab(t){D.tab=t;as();render()}

// ─── Tiers ───
function rT(){
  const so=[...D.tiers].sort((a,b)=>a.maxChars-b.maxChars);
  const pills=so.map(t=>`<div class="tp"><span class="tp-l">${t.label||'≤'+t.maxChars+'字'}</span><span class="tp-v">¥${t.price}</span></div>`).join('');
  let pv='';if(D.tp.length){const rows=[...D.tp].sort((a,b)=>a.maxChars-b.maxChars).map(t=>`<tr><td>${t.label}</td><td>${t.maxChars}</td><td>${t.price}</td></tr>`).join('');pv=`<div class="prs"><div class="prs-t">识别到 ${D.tp.length} 条</div><table><thead><tr><th>标签</th><th>字数</th><th>单价</th></tr></thead><tbody>${rows}</tbody></table></div>`}
  const manual=so.map(t=>`<div class="tr"><div class="tf"><div class="lbl">字数上限</div><input type="number" class="inp inp-s" value="${t.maxChars}" onchange="uT('${t.id}','maxChars',+this.value)"></div><div class="tf"><div class="lbl">单价</div><input type="number" step="0.1" class="inp inp-s" value="${t.price}" onchange="uT('${t.id}','price',+this.value)"></div><div class="tf"><div class="lbl">标签</div><input class="inp inp-s" value="${$(t.label)}" onchange="uT('${t.id}','label',this.value)"></div><button class="b-ico" style="color:var(--red)" onclick="dT('${t.id}')">✕</button></div>`).join('');
  return `<div class="card"><div class="ch"><div class="ci ci-a">💰</div><div class="ct">字数价格阶梯</div></div>
  <div class="seg"><button class="seg-b ${D.tm==='smart'?'on':''}" onclick="D.tm='smart';render()">智能输入</button><button class="seg-b ${D.tm==='manual'?'on':''}" onclick="D.tm='manual';render()">手动编辑</button></div>
  ${D.tm==='smart'?`<div class="hint"><code>10字：0.8\n10-20字：1.2\n20-50字：2\n50-100字：4</code></div>
  <textarea id="si" class="inp" rows="5" placeholder="每行一条价格规则...">${$(D.st)}</textarea>
  <div class="flex g8 mt10"><button class="btn b-glass" onclick="pvT()">识别预览</button>${D.tp.length?`<button class="btn b-acc" onclick="apT()" ${D.ta?'disabled':''}>应用${D.ta?' ✓':''}</button>`:''}</div>${pv}
  <div class="lbl mt16">当前生效</div><div class="tp-w">${pills}</div>`
  :`${manual}<button class="btn b-glass b-full mt10" onclick="aT()">+ 添加</button>`}</div>`;
}
function pvT(){const el=document.getElementById('si');if(!el)return;D.st=el.value;D.tp=pt(el.value);D.ta=false;render()}
function apT(){if(D.tp.length){D.tiers=D.tp;D.ta=true;D.projects.forEach(p=>p.items.forEach(i=>{i.price=ct(D.tiers,i.chars)}));as();render();toast('价格已更新')}}
function aT(){D.tiers.push({id:uid(),maxChars:100,price:5,label:''});as();render()}
function dT(id){D.tiers=D.tiers.filter(t=>t.id!==id);as();render()}
function uT(id,f,v){const t=D.tiers.find(x=>x.id===id);if(t)t[f]=v;as();render()}

// ─── Projects ───
function rP(){
  const cards=D.projects.length===0?`<div style="text-align:center;padding:56px 0"><div style="font-size:40px;margin-bottom:12px;opacity:.35">📂</div><div style="font-size:13px;color:var(--t3)">创建第一个项目</div></div>`:D.projects.map((p,i)=>rPC(p,i)).join('');
  return `<div class="card"><div class="ch"><div class="ci ci-w">📁</div><div class="ct">项目</div></div>
  <div class="flex g10 mb16"><input id="np" class="inp f1" placeholder="项目名称…" onkeydown="if(event.key==='Enter')addP()"><button class="btn b-acc" onclick="addP()">创建</button></div></div>${cards}`;
}
function addP(){const el=document.getElementById('np');if(!el||!el.value.trim())return;D.projects.push({id:uid(),name:el.value.trim(),items:[],link:'',sb:false,si:false});as();render()}
function delP(id){if(!confirm('删除该项目？'))return;D.projects=D.projects.filter(p=>p.id!==id);as();render()}
function clrP(id){if(!confirm('清空所有文案？'))return;const p=D.projects.find(x=>x.id===id);if(p)p.items=[];as();render()}

function rPC(p,idx){
  const g=grp(p),gt=pT(p);
  let sum='';if(p.items.length){const rows=g.map(x=>`<tr><td>${x.price}</td><td>${x.count}</td><td>${x.total.toFixed(1)}</td></tr>`).join('');sum=`<div class="tw0 mt14"><table><thead><tr><th>单价</th><th>数量</th><th>总价</th></tr></thead><tbody>${rows}<tr class="rtot"><td colspan="2">合计</td><td>¥${gt.toFixed(1)}</td></tr></tbody></table></div>`}
  let items='';if(p.items.length){const ir=p.items.map((x,i)=>`<tr><td>${i+1}</td><td>${$(x.text)}</td><td>${x.chars}</td><td>${x.price}</td><td><button class="b-ico" style="font-size:10px" onclick="dI('${p.id}','${x.id}')">✕</button></td></tr>`).join('');items=`<button class="btn b-ghost b-full mt10" onclick="tI('${p.id}')">${p.si?'收起列表':'查看文案 · '+p.items.length}</button>${p.si?`<div class="iw mt8"><table><thead><tr><th style="width:28px">#</th><th>文案</th><th style="width:34px">字</th><th style="width:34px">价</th><th style="width:24px"></th></tr></thead><tbody>${ir}</tbody></table></div>`:''}`}
  return `<div class="pc" style="animation:fadeUp .5s var(--ease) ${idx*.06}s both">
  <div class="ph"><div class="f1"><div class="pn">${$(p.name)}</div><div class="pm">${p.items.length} 条 · <span class="pa">¥${gt.toFixed(1)}</span></div></div>
  <div class="flex g6">${p.items.length?`<button class="b-ico" onclick="clrP('${p.id}')">🧹</button>`:''}<button class="b-ico" onclick="delP('${p.id}')">🗑️</button></div></div>
  <div class="mb10"><div class="lbl">链接</div><input class="inp" value="${$(p.link||'')}" placeholder="飞书 / 文档链接…" onchange="uPF('${p.id}','link',this.value)"></div>
  <button class="btn b-glass b-full" onclick="tB('${p.id}')">${p.sb?'收起':'添加文案'}</button>
  ${p.sb?`<div class="mt10"><textarea id="b_${p.id}" class="inp" rows="5" placeholder="粘贴文案，支持两种格式：&#10;&#10;① 有数字标号（按标号分条，多行合并）：&#10;1. 第一条文案内容&#10;可以换行继续写&#10;2. 第二条文案&#10;&#10;② 无标号（每行算一条）"></textarea><button class="btn b-acc mt10" onclick="bAdd('${p.id}')">添加</button></div>`:''}
  ${sum}${items}</div>`;
}
function tB(id){const p=D.projects.find(x=>x.id===id);if(p)p.sb=!p.sb;render()}
function tI(id){const p=D.projects.find(x=>x.id===id);if(p)p.si=!p.si;render()}
function uPF(id,f,v){const p=D.projects.find(x=>x.id===id);if(p)p[f]=v;as()}
function bAdd(id){
  const el=document.getElementById('b_'+id),p=D.projects.find(x=>x.id===id);if(!el||!p)return;
  const raw=el.value;
  // Check if text has numbered entries (1. 2. 3. or 1、2、 etc)
  const hasNumbers=/(?:^|\n)\s*\d+[\.\、\)\]\s]/m.test(raw);
  let entries=[];
  if(hasNumbers){
    // Split by number markers, merge lines between markers into one entry
    const lines=raw.split('\n');
    let cur=null;
    lines.forEach(line=>{
      const m=line.match(/^\s*\d+[\.\、\)\]\s]+(.*)$/);
      if(m){
        if(cur!==null) entries.push(cur);
        cur=m[1].trim();
      } else if(cur!==null && line.trim()){
        cur+=line.trim(); // Append continuation line (no extra space, treat as same paragraph)
      } else if(cur===null && line.trim()){
        // Lines before any number marker — treat each as separate
        entries.push(line.trim());
      }
    });
    if(cur!==null) entries.push(cur);
  } else {
    // No numbers: each non-empty line is one entry
    entries=raw.split('\n').map(l=>l.trim()).filter(Boolean);
  }
  entries=entries.filter(Boolean);
  entries.forEach(t=>{const c=cc(t);p.items.push({id:uid(),text:t,chars:c,price:ct(D.tiers,c)})});
  p.sb=false;as();render();toast(`添加 ${entries.length} 条`);
}
function dI(pid,iid){const p=D.projects.find(x=>x.id===pid);if(p)p.items=p.items.filter(i=>i.id!==iid);as();render()}

function getExProjects(){
  const withItems=D.projects.filter(p=>p.items.length);
  if(!D.exSel||!D.exSel.length) return withItems; // none selected = all
  return withItems.filter(p=>D.exSel.includes(p.id));
}
function isExSel(id){return !D.exSel.length||D.exSel.includes(id)}
function togExSel(id){
  const withItems=D.projects.filter(p=>p.items.length);
  // If exSel empty, initialize with all
  if(!D.exSel.length) D.exSel=withItems.map(p=>p.id);
  if(D.exSel.includes(id)){
    D.exSel=D.exSel.filter(x=>x!==id);
  } else {
    D.exSel.push(id);
  }
  render();
}
function exSelAll(){D.exSel=[];render()}// empty = all
function exSelNone(){D.exSel=['__none__'];render()}// hack: nothing matches
function exSelInvert(){
  const withItems=D.projects.filter(p=>p.items.length);
  if(!D.exSel.length) D.exSel=withItems.map(p=>p.id);
  const newSel=withItems.filter(p=>!D.exSel.includes(p.id)).map(p=>p.id);
  D.exSel=newSel.length?newSel:['__none__'];
  render();
}
